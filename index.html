    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --bg: #0f0f1a;
            --bg2: #13131f;
            --surface: rgba(255,255,255,0.05);
            --surface-hover: rgba(255,255,255,0.08);
            --border: rgba(99,102,241,0.2);
            --border-light: rgba(255,255,255,0.08);
            --text: #f0f0ff;
            --text-muted: #94a3b8;
            --text-dim: #64748b;
            --shadow: 0 8px 32px rgba(0,0,0,0.4);
            --radius: 16px;
            --radius-sm: 10px;
            /* Type colors */
            --type-L: #f59e0b;
            --type-E: #ef4444;
            --type-C: #ec4899;
            --type-A: #06b6d4;
            --type-R: #22c55e;
        }
        [data-theme="light"] {
            --bg: #f0f0ff;
            --bg2: #e8e8ff;
            --surface: rgba(255,255,255,0.7);
            --surface-hover: rgba(255,255,255,0.9);
            --border: rgba(99,102,241,0.2);
            --border-light: rgba(99,102,241,0.15);
            --text: #1e1e3f;
            --text-muted: #4b5563;
            --text-dim: #6b7280;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.3s, color 0.3s;
        }
        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(99,102,241,0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(139,92,246,0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* App Loader */
        .app-loader {
            position: fixed; inset: 0; z-index: 9999;
            background: var(--bg);
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 16px;
            transition: opacity 0.5s;
        }
        .app-loader.hide { opacity: 0; pointer-events: none; }
        .loader-emoji { font-size: 56px; animation: bounce 1s infinite; }
        .loader-spinner {
            width: 40px; height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .loader-text { color: var(--text-muted); font-size: 14px; }

        /* Skip link */
        .skip-link {
            position: absolute; top: -40px; left: 16px;
            background: var(--primary); color: white;
            padding: 8px 16px; border-radius: 8px;
            text-decoration: none; font-size: 14px; z-index: 10000;
            transition: top 0.2s;
        }
        .skip-link:focus { top: 8px; }

        /* Theme Toggle */
        .theme-toggle {
            position: fixed; top: 16px; right: 60px; z-index: 100;
            background: var(--surface); border: 1px solid var(--border-light);
            border-radius: 50%; width: 44px; height: 44px;
            font-size: 20px; cursor: pointer;
            backdrop-filter: blur(20px);
            transition: all 0.2s;
        }
        .theme-toggle:hover { transform: scale(1.1); background: var(--surface-hover); }

        /* Language Selector */
        .language-selector {
            position: fixed; top: 16px; right: 8px; z-index: 100;
        }
        .lang-btn {
            background: var(--surface); border: 1px solid var(--border-light);
            border-radius: 50%; width: 44px; height: 44px;
            font-size: 20px; cursor: pointer;
            backdrop-filter: blur(20px);
            transition: all 0.2s;
        }
        .lang-btn:hover { transform: scale(1.1); }
        .lang-menu {
            position: absolute; top: 52px; right: 0;
            background: var(--bg2); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 8px;
            min-width: 180px;
            backdrop-filter: blur(20px);
            box-shadow: var(--shadow);
        }
        .lang-menu.hidden { display: none; }
        .lang-option {
            display: block; width: 100%;
            background: none; border: none;
            padding: 10px 14px; border-radius: var(--radius-sm);
            color: var(--text); font-size: 14px;
            text-align: left; cursor: pointer;
            transition: background 0.15s;
        }
        .lang-option:hover { background: var(--surface-hover); }
        .lang-option.active { background: rgba(99,102,241,0.2); color: var(--primary-light); }

        /* Screens */
        .screen { display: none; position: relative; z-index: 1; min-height: 100vh; }
        .screen.active { display: block; }

        /* ==================== INTRO SCREEN ==================== */
        .intro-container {
            max-width: 480px; margin: 0 auto;
            padding: 80px 24px 40px;
            display: flex; flex-direction: column;
            align-items: center; text-align: center; gap: 20px;
        }
        .intro-icon { font-size: 72px; animation: float 3s ease-in-out infinite; }
        .intro-title {
            font-size: clamp(28px, 7vw, 40px);
            font-weight: 800; line-height: 1.2;
            background: linear-gradient(135deg, var(--primary-light), #a78bfa, #c084fc);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .intro-subtitle {
            font-size: 16px; color: var(--text-muted);
            line-height: 1.6;
        }
        .intro-meta {
            display: flex; gap: 12px; flex-wrap: wrap;
            justify-content: center;
        }
        .meta-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px; padding: 6px 16px;
            font-size: 13px; color: var(--text-muted);
        }
        .intro-types {
            display: grid; grid-template-columns: repeat(5, 1fr);
            gap: 10px; width: 100%;
        }
        .type-preview {
            background: var(--surface);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-sm);
            padding: 12px 6px;
            display: flex; flex-direction: column;
            align-items: center; gap: 4px;
            transition: all 0.2s;
        }
        .type-preview:hover { background: var(--surface-hover); transform: translateY(-2px); }
        .type-preview .tp-emoji { font-size: 24px; }
        .type-preview .tp-name { font-size: 11px; color: var(--text-muted); text-align: center; }
        .btn-start {
            width: 100%; max-width: 320px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white; border: none;
            padding: 18px 32px; border-radius: 50px;
            font-size: 18px; font-weight: 700;
            cursor: pointer; letter-spacing: 0.5px;
            box-shadow: 0 4px 24px rgba(99,102,241,0.4);
            transition: all 0.2s; min-height: 56px;
        }
        .btn-start:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(99,102,241,0.5); }
        .btn-start:active { transform: translateY(0); }
        .btn-start-pulse { animation: pulse-glow 2s infinite; }
        .social-proof { font-size: 13px; color: var(--text-dim); }
        .micro-copy { font-size: 12px; color: var(--text-dim); }

        /* ==================== QUIZ SCREEN ==================== */
        .quiz-wrapper {
            max-width: 560px; margin: 0 auto;
            padding: 20px 20px 40px;
            min-height: 100vh;
            display: flex; flex-direction: column; gap: 20px;
        }
        .quiz-header { padding-top: 60px; }
        .progress-bar {
            width: 100%; height: 6px;
            background: var(--surface); border-radius: 3px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            border-radius: 3px;
            transition: width 0.4s ease;
        }
        .progress-text {
            text-align: right; font-size: 13px;
            color: var(--text-muted); margin-top: 8px;
        }
        .question-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px 24px;
            backdrop-filter: blur(20px);
            box-shadow: var(--shadow);
            animation: slideIn 0.35s ease;
        }
        .q-number {
            font-size: 12px; font-weight: 600;
            color: var(--primary-light);
            text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 12px;
        }
        .q-text {
            font-size: clamp(16px, 4vw, 20px);
            font-weight: 700; line-height: 1.5;
            margin-bottom: 24px;
        }
        .q-options { display: flex; flex-direction: column; gap: 12px; }
        .q-option {
            background: var(--surface);
            border: 2px solid var(--border-light);
            border-radius: var(--radius-sm);
            padding: 16px 18px;
            font-size: 15px; color: var(--text);
            text-align: left; cursor: pointer;
            transition: all 0.2s;
            min-height: 52px;
            display: flex; align-items: center; gap: 12px;
        }
        .q-option:hover {
            background: rgba(99,102,241,0.1);
            border-color: var(--primary);
            transform: translateX(4px);
        }
        .q-option.selected {
            background: rgba(99,102,241,0.2);
            border-color: var(--primary);
        }
        .q-option .opt-letter {
            flex-shrink: 0;
            width: 28px; height: 28px;
            border-radius: 50%;
            background: rgba(99,102,241,0.15);
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 700;
            color: var(--primary-light);
        }
        .skip-question {
            text-align: center;
            background: none; border: none;
            color: var(--text-dim); font-size: 13px;
            cursor: pointer; padding: 8px;
            text-decoration: underline;
            transition: color 0.2s;
        }
        .skip-question:hover { color: var(--text-muted); }

        /* ==================== LOADING SCREEN ==================== */
        .loading-wrapper {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh; gap: 24px; padding: 40px;
            text-align: center;
        }
        .loading-icon { font-size: 60px; animation: rotate-scale 2s ease-in-out infinite; }
        .loading-bar {
            width: 260px; height: 8px;
            background: var(--surface); border-radius: 4px;
            overflow: hidden;
        }
        .loading-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            border-radius: 4px;
            width: 0%; transition: width 0.3s;
        }
        .loading-text { color: var(--text-muted); font-size: 15px; }
        .loading-messages {
            font-size: 13px; color: var(--text-dim);
            min-height: 20px;
        }

        /* ==================== RESULT SCREEN ==================== */
        .result-container {
            max-width: 560px; margin: 0 auto;
            padding: 24px 20px 80px;
            display: flex; flex-direction: column; gap: 16px;
        }

        /* Result Header */
        .result-header {
            text-align: center; padding: 40px 24px 32px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            position: relative; overflow: hidden;
        }
        .result-header::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(99,102,241,0.1), rgba(139,92,246,0.05));
        }
        .result-emoji-large {
            font-size: 80px; display: block;
            margin-bottom: 16px;
            animation: pop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .result-type-badge {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 6px 20px; border-radius: 20px;
            font-size: 13px; font-weight: 600;
            margin-bottom: 12px;
            border: 2px solid currentColor;
        }
        .result-title-text {
            font-size: clamp(26px, 7vw, 36px);
            font-weight: 900; margin-bottom: 4px;
        }
        .result-en {
            font-size: 16px; color: var(--text-muted);
            font-weight: 500; margin-bottom: 12px;
        }
        .result-subtitle-text {
            font-size: 15px; color: var(--text-muted);
            line-height: 1.5;
        }

        /* Secondary type */
        .secondary-badge {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            padding: 10px 20px;
            background: var(--surface);
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            font-size: 14px; color: var(--text-muted);
        }
        .secondary-badge strong { color: var(--text); }

        /* Result Cards */
        .result-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px; padding: 24px;
            backdrop-filter: blur(20px);
            box-shadow: var(--shadow);
        }
        .result-card h3 {
            font-size: 16px; font-weight: 700;
            margin-bottom: 16px; color: var(--text);
        }
        .result-desc {
            font-size: 15px; line-height: 1.7;
            color: var(--text-muted);
        }

        /* Score Bars */
        .score-bars { display: flex; flex-direction: column; gap: 12px; }
        .score-row { display: flex; align-items: center; gap: 12px; }
        .score-label {
            display: flex; align-items: center; gap: 6px;
            width: 90px; flex-shrink: 0;
            font-size: 13px; font-weight: 600;
        }
        .score-bar-wrap {
            flex: 1; height: 10px;
            background: var(--surface); border-radius: 5px;
            overflow: hidden;
        }
        .score-bar-fill {
            height: 100%; border-radius: 5px;
            transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .score-num {
            width: 24px; text-align: right;
            font-size: 13px; font-weight: 600;
            color: var(--text-muted);
        }

        /* Strength/Weakness items */
        .strength-list, .weakness-list { display: flex; flex-direction: column; gap: 10px; }
        .strength-item, .weakness-item {
            display: flex; align-items: flex-start; gap: 10px;
            padding: 12px 14px;
            border-radius: var(--radius-sm);
            font-size: 14px; line-height: 1.5;
        }
        .strength-item {
            background: rgba(34,197,94,0.08);
            border: 1px solid rgba(34,197,94,0.2);
        }
        .weakness-item {
            background: rgba(239,68,68,0.06);
            border: 1px solid rgba(239,68,68,0.15);
        }
        .strength-item .item-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
        .weakness-item .item-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }

        /* Best match */
        .best-match-card {
            display: flex; align-items: center; gap: 16px;
            background: rgba(99,102,241,0.08);
            border: 1px solid rgba(99,102,241,0.2);
            border-radius: var(--radius-sm); padding: 16px;
        }
        .match-emoji { font-size: 40px; }
        .match-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
        .match-reason { font-size: 13px; color: var(--text-muted); line-height: 1.4; }

        /* Careers */
        .careers-list { display: flex; flex-direction: column; gap: 10px; }
        .career-item {
            display: flex; align-items: center; gap: 10px;
            padding: 12px 14px;
            background: rgba(99,102,241,0.06);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
        }
        .career-icon { font-size: 20px; }

        /* Motivation */
        .motivation-text {
            font-size: 15px; line-height: 1.7;
            color: var(--text-muted);
            padding: 16px;
            background: rgba(139,92,246,0.06);
            border: 1px solid rgba(139,92,246,0.15);
            border-radius: var(--radius-sm);
        }

        /* Action Buttons */
        .action-buttons {
            display: flex; flex-direction: column; gap: 12px;
        }
        .btn-action {
            width: 100%; padding: 16px;
            border-radius: 50px; font-size: 16px; font-weight: 600;
            cursor: pointer; border: none;
            transition: all 0.2s; min-height: 52px;
        }
        .btn-share {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 4px 20px rgba(99,102,241,0.35);
        }
        .btn-share:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(99,102,241,0.45); }
        .btn-retry {
            background: var(--surface);
            border: 1px solid var(--border) !important;
            color: var(--text);
        }
        .btn-retry:hover { background: var(--surface-hover); }

        /* Share CTA */
        .share-cta {
            text-align: center;
            font-size: 14px; color: var(--text-muted);
            padding: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }

        /* Ad Banner */
        .ad-banner {
            background: var(--surface); border: 1px dashed var(--border);
            border-radius: var(--radius); padding: 20px;
            text-align: center; color: var(--text-dim);
            font-size: 12px; min-height: 60px;
            display: flex; align-items: center; justify-content: center;
        }

        /* Share Modal */
        .overlay {
            position: fixed; inset: 0; z-index: 1000;
            background: rgba(0,0,0,0.7);
            display: flex; align-items: flex-end; justify-content: center;
            backdrop-filter: blur(4px);
        }
        .overlay.hidden { display: none; }
        .share-modal-content {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 24px 24px 0 0;
            padding: 28px 24px 40px;
            width: 100%; max-width: 480px;
            animation: slideUp 0.3s ease;
        }
        .share-modal-close {
            position: absolute; top: 16px; right: 16px;
            background: var(--surface); border: none;
            width: 36px; height: 36px; border-radius: 50%;
            font-size: 20px; color: var(--text); cursor: pointer;
        }
        .share-modal-title {
            font-size: 20px; font-weight: 700; margin-bottom: 8px;
        }
        .share-modal-subtitle {
            font-size: 14px; color: var(--text-muted); margin-bottom: 24px;
        }
        .share-buttons {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
        }
        .share-btn {
            display: flex; align-items: center; gap: 10px;
            padding: 14px 16px; border-radius: var(--radius-sm);
            border: none; cursor: pointer;
            font-size: 14px; font-weight: 600;
            transition: all 0.2s; min-height: 48px;
        }
        .share-icon { font-size: 20px; flex-shrink: 0; }
        .share-twitter { background: #1da1f2; color: white; }
        .share-facebook { background: #1877f2; color: white; }
        .share-kakaotalk { background: #fee500; color: #391b1b; }
        .share-copy { background: var(--surface); border: 1px solid var(--border) !important; color: var(--text); }
        .share-btn:hover { transform: translateY(-2px); opacity: 0.9; }
        .share-btn-native {
            width: 100%; margin-top: 12px;
            padding: 14px; border-radius: var(--radius-sm);
            background: rgba(99,102,241,0.1);
            border: 1px solid rgba(99,102,241,0.3);
            color: var(--primary-light); font-size: 15px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
        }
        .share-btn-native:hover { background: rgba(99,102,241,0.2); }

        /* Footer */
        .game-footer {
            position: fixed; bottom: 0; left: 0; right: 0;
            padding: 12px 20px;
            background: rgba(15,15,26,0.9);
            border-top: 1px solid var(--border-light);
            backdrop-filter: blur(20px);
            z-index: 50;
        }
        .back-link {
            display: inline-flex; align-items: center; gap: 6px;
            color: var(--text-muted); text-decoration: none;
            font-size: 13px; transition: color 0.2s;
        }
        .back-link:hover { color: var(--text); }

        /* Animations */
        @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes float { 0%,100% { transform: translateY(0) rotate(-3deg); } 50% { transform: translateY(-12px) rotate(3deg); } }
        @keyframes pulse-glow { 0%,100% { box-shadow: 0 4px 24px rgba(99,102,241,0.4); } 50% { box-shadow: 0 4px 40px rgba(99,102,241,0.7); } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes pop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes rotate-scale { 0%,100% { transform: scale(1) rotate(0deg); } 50% { transform: scale(1.1) rotate(10deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .result-card { animation: fadeIn 0.5s ease both; }
        .result-card:nth-child(1) { animation-delay: 0.1s; }
        .result-card:nth-child(2) { animation-delay: 0.2s; }
        .result-card:nth-child(3) { animation-delay: 0.3s; }
        .result-card:nth-child(4) { animation-delay: 0.4s; }
        .result-card:nth-child(5) { animation-delay: 0.5s; }

        /* Responsive */
        @media (max-width: 400px) {
            .intro-types { grid-template-columns: repeat(5, 1fr); }
            .tp-name { font-size: 9px; }
        }

        /* Toast */
        .toast {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: var(--primary); color: white;
            padding: 12px 24px; border-radius: 50px;
            font-size: 14px; font-weight: 600;
            z-index: 9999; opacity: 0;
            transition: opacity 0.3s;
            white-space: nowrap;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>
    <a href="#main-content" class="skip-link" data-i18n="app.skipLink">본문 바로가기</a>

    <div class="app-loader" id="app-loader">
        <div class="loader-emoji">💼</div>
        <div class="loader-spinner"></div>
        <div class="loader-text" data-i18n="app.loading">로딩 중...</div>
    </div>

    <!-- Theme Toggle -->
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">☀️</button>

    <!-- Language Selector -->
    <div class="language-selector">
        <button id="lang-toggle" class="lang-btn" title="Change Language">🌐</button>
        <div id="lang-menu" class="lang-menu hidden">
            <button class="lang-option" data-lang="ko">🇰🇷 한국어</button>
            <button class="lang-option" data-lang="en">🇺🇸 English</button>
            <button class="lang-option" data-lang="ja">🇯🇵 日本語</button>
            <button class="lang-option" data-lang="es">🇪🇸 Español</button>
            <button class="lang-option" data-lang="pt">🇧🇷 Português</button>
            <button class="lang-option" data-lang="zh">🇨🇳 简体中文</button>
            <button class="lang-option" data-lang="id">🇮🇩 Bahasa Indonesia</button>
            <button class="lang-option" data-lang="tr">🇹🇷 Türkçe</button>
            <button class="lang-option" data-lang="de">🇩🇪 Deutsch</button>
            <button class="lang-option" data-lang="fr">🇫🇷 Français</button>
            <button class="lang-option" data-lang="hi">🇮🇳 हिन्दी</button>
            <button class="lang-option" data-lang="ru">🇷🇺 Русский</button>
        </div>
    </div>

    <!-- Intro Screen -->
    <div id="intro-screen" class="screen active" id="main-content">
        <div class="intro-container">
            <div class="intro-icon">💼</div>
            <h1 class="intro-title" data-i18n="intro.title">직장인 유형<br>테스트</h1>
            <p class="intro-subtitle" data-i18n="intro.subtitle">직장에서 나는 어떤 유형의 사람인가?<br>25가지 직장 상황으로 알아보는 나의 업무 스타일!</p>
            <div class="intro-meta">
                <span class="meta-item" data-i18n="intro.meta1">25문항</span>
                <span class="meta-item" data-i18n="intro.meta2">약 5분</span>
                <span class="meta-item" data-i18n="intro.meta3">5가지 유형</span>
            </div>
            <div class="intro-types">
                <div class="type-preview"><span class="tp-emoji">👑</span><span class="tp-name" data-i18n="types.L.name">리더형</span></div>
                <div class="type-preview"><span class="tp-emoji">⚡</span><span class="tp-name" data-i18n="types.E.name">실행형</span></div>
                <div class="type-preview"><span class="tp-emoji">🎨</span><span class="tp-name" data-i18n="types.C.name">창의형</span></div>
                <div class="type-preview"><span class="tp-emoji">🔬</span><span class="tp-name" data-i18n="types.A.name">분석형</span></div>
                <div class="type-preview"><span class="tp-emoji">🤝</span><span class="tp-name" data-i18n="types.R.name">관계형</span></div>
            </div>
            <button id="btn-start" class="btn-start btn-start-pulse" data-i18n="intro.startBtn">나의 유형 찾기</button>
            <p class="social-proof" data-i18n="intro.socialProof">3,100명이 자신의 업무 유형을 발견했습니다 💼</p>
            <p class="micro-copy" data-i18n="intro.microCopy">약 5분 소요 · 결과 즉시 공유 가능</p>
        </div>
    </div>

    <!-- Quiz Screen -->
    <div id="quiz-screen" class="screen">
        <div class="quiz-wrapper">
            <div class="quiz-header">
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill" style="width:0%"></div>
                </div>
                <div id="progress-text" class="progress-text">1 / 25</div>
            </div>
            <div class="question-card" id="question-card">
                <div id="q-number" class="q-number"></div>
                <p id="q-text" class="q-text"></p>
                <div id="q-options" class="q-options"></div>
            </div>
            <button class="skip-question" id="btn-skip" data-i18n="quiz.skip">건너뛰기</button>
        </div>
    </div>

    <!-- Loading Screen -->
    <div id="loading-screen" class="screen">
        <div class="loading-wrapper">
            <div class="loading-icon">🧠</div>
            <div class="loading-bar">
                <div id="loading-fill" class="loading-fill"></div>
            </div>
            <p class="loading-text" id="loading-text" data-i18n="loading.text">업무 유형을 분석 중...</p>
            <p class="loading-messages" id="loading-msg"></p>
        </div>
    </div>

    <!-- Result Screen -->
    <div id="result-screen" class="screen">
        <div class="result-container" id="result-container"></div>
    </div>

    <!-- Share Modal -->
    <div class="overlay hidden" id="share-modal">
        <div class="share-modal-content" style="position:relative">
            <button class="share-modal-close" id="share-close">&times;</button>
            <h2 class="share-modal-title" data-i18n="share.title">결과 공유하기</h2>
            <p class="share-modal-subtitle" data-i18n="share.subtitle">내 직장인 유형을 동료들과 비교해보세요!</p>
            <div class="share-buttons">
                <button class="share-btn share-twitter" id="share-twitter">
                    <span class="share-icon">𝕏</span>
                    <span data-i18n="share.twitter">Twitter</span>
                </button>
                <button class="share-btn share-facebook" id="share-facebook">
                    <span class="share-icon">f</span>
                    <span data-i18n="share.facebook">Facebook</span>
                </button>
                <button class="share-btn share-kakaotalk" id="share-kakaotalk">
                    <span class="share-icon">💬</span>
                    <span data-i18n="share.kakaotalk">카카오톡</span>
                </button>
                <button class="share-btn share-copy" id="share-copy">
                    <span class="share-icon">🔗</span>
                    <span data-i18n="share.copyLink">링크 복사</span>
                </button>
            </div>
            <button class="share-btn-native" id="share-native" data-i18n="share.nativeShare">공유하기</button>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Footer -->
    <footer class="game-footer">
        <a href="https://dopabrain.com/portal/" class="back-link" data-i18n="game.back">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="m15 18-6-6 6-6"></path></svg>
            DopaBrain 홈
        </a>
    </footer>

    <script src="js/i18n.js"></script>
    <script src="js/app.js"></script>
    <script src="/portal/js/cross-promo.js" defer></script>
</body>
</html>
